<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Rolagem Crítica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topbar"><marquee behavior="scroll" direction="left">Frete grátis em compras acima de R$ 200,00 para as regiões Sul e Sudeste</marquee></div>
    <header>
        <a href="index.html" class="logo">Rolagem Crítica</a>
        <div class="search-bar">
            <input type="text" placeholder="O que você está procurando?">
            <button type="button" onclick="realizarBusca(event)">Buscar</button>
        </div>
        <div class="header-actions">
            <a href="login.html">Minha Conta</a>
            <a href="carrinho.html">Carrinho (0)</a>
        </div>
    </header>    <main class="auth-container">
        <form id="recover-form" class="auth-form">
            <h2>Recuperar Senha</h2>
            <p style="margin-bottom: 1.5rem; color: var(--gray); text-align: center;">Digite o e-mail cadastrado. Enviaremos um link para você criar uma nova senha.</p>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Enviar Link de Recuperação</button>
            <div class="auth-links">
                <a href="login.html">Voltar para o Login</a>
            </div>
        </form>
    </main>    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Rolagem Crítica Editora LTDA. Todos os direitos reservados.</p>
        </div>
    </footer>
<script src="script.js"></script>
</body>
</html>
